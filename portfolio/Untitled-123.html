<!DOCTYPE html>
<html>
<head>
    <title>AIUB Student registation form</title>
</head>
<body>

    <h2>AIUB Student Information Form</h2>

    <form>

        <fieldset>
            <legend>Student Information</legend>

            <label>Student ID:</label><br>
            <input type="text" name="student_id"><br><br>

            <label>First Name:</label><br>
            <input type="text" name="first_name"><br><br>

            <label>Last Name:</label><br>
            <input type="text" name="last_name"><br><br>

            <label>Gender:</label><br>
            <input type="radio" name="gender" value="Male"> Male
            <input type="radio" name="gender" value="Female"> Female
            <input type="radio" name="gender" value="Other"> Other
            <br><br>

            <label>Email:</label><br>
            <input type="email" name="email"><br><br>

            <label>Phone Number:</label><br>
            <input type="tel" name="phone"><br><br>
        </fieldset>

        <br>

        <fieldset>
            <legend>Department</legend>

            <input type="radio" name="department" value="CSE"> CSE<br>
            <input type="radio" name="department" value="CS"> CS<br>
            <input type="radio" name="department" value="EEE"> EEE<br>
            <input type="radio" name="department" value="BBA"> BBA<br>
            <input type="radio" name="department" value="Architecture"> Architecture<br>
        </fieldset>

        <br>

        <fieldset>
            <legend>Skills</legend>

            <input type="checkbox" name="skills" value="Web Development"> Web Development<br>
            <input type="checkbox" name="skills" value="AI/ML"> AI/ML<br>
            <input type="checkbox" name="skills" value="Android"> Android<br>
            <input type="checkbox" name="skills" value="Data Science"> Data Science<br>
        </fieldset>

        <br>

        <fieldset>
            <legend>Academic Information</legend>

            <label>Semester:</label><br>
            <select name="semester">
                <option>Spring</option>
                <option>Summer</option>
                <option>Fall</option>
            </select>
            <br><br>

            <label>Date of Birth:</label><br>
            <input type="date" name="dob">
        </fieldset>

        <br>

        <input type="submit" value="Submit">
        <input type="reset" value="Reset">

    </form>

</body>
</html>
