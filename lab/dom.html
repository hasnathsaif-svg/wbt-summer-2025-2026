<!DOCTYPE html>
<html>
 
<head>
 <title>Form Validation</title>
 <script>
 document.addEventListener("DOMContentLoaded", function () {
 document.getElementById("myForm").addEventListener("submit", function (event) {
 var fname = document.getElementById("fname").value.trim();
 var lname = document.getElementById("lname").value.trim();
 var email = document.getElementById("email").value.trim();
 var dob = document.getElementById("dob").value.trim();
 
 if (fname === "" || lname === "" || email === "" || dob === "") {
 alert("All fields must be filled out.");
 event.preventDefault();
 return;
 }
 
 if (!email.includes("@")) {
 alert("Please enter a valid email address (missing '@').");
 event.preventDefault();
 return;
 }
 
 var timestamp = Date.parse(dob);
 if (isNaN(timestamp)) {
 alert("Please enter a valid date of birth.");
 event.preventDefault();
 return;
 }
 });
 });
 </script>
</head>
 
<body>
 
 <form id="myForm" action="/action_page.php" method="post">
 First Name: <input type="text" id="fname" name="fname"><br><br>
 Last Name: <input type="text" id="lname" name="lname"><br><br>
 Email: <input type="text" id="email" name="email"><br><br>
 Date of Birth: <input type="date" id="dob" name="dob"><br><br>
 <input type="submit" value="Submit">
 </form>
 
</body>
 
</html>
