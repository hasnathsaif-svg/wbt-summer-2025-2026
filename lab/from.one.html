<!DOCTYPE html>
<html>
<head>
    <title>Create Workspace Form</title>
</head>
<body>

<table align="center" border="0" cellpadding="10" width="450">
    <tr>
        <td colspan="2" bgcolor="#0B1F6A" style="color:white;">
            <small>GET STARTED</small><br>
            <h2>Create your workspace</h2>
        </td>
    </tr>

    <tr>
        <td colspan="2">
            <label><b>Full name</b></label><br>
            <input type="text" placeholder="Jane Doe" style="width:100%;">
        </td>
    </tr>

    <tr>
        <td colspan="2">
            <label><b>Phone number</b></label><br>
            <input type="tel" placeholder="5551234567" style="width:100%;">
        </td>
    </tr>

    <tr>
        <td colspan="2">
            <label><b>Date of birth</b></label><br>
            <input type="date" style="width:100%;">
        </td>
    </tr>

    <tr>
        <td colspan="2">
            <label><b>Work email</b></label><br>
            <input type="email" placeholder="jane@company.com" style="width:100%;">
        </td>
    </tr>

    <tr>
        <td colspan="2">
            <label><b>Password</b></label><br>
            <input type="password" placeholder="At least 8 characters" style="width:100%;">
        </td>
    </tr>

    <tr>
        <td colspan="2">
            <input type="checkbox" checked>
            Email me product updates and tips
        </td>
    </tr>

    <tr>
        <td colspan="2">
            <input type="checkbox">
            I agree to the Terms & Privacy Policy
        </td>
    </tr>

    <tr>
        <td>
            <input type="submit" value="Create Workspace" style="width:100%; background:#1E90FF; color:white; height:40px;">
        </td>
        <td>
            <input type="reset" value="Reset" style="width:100%; height:40px;">
        </td>
    </tr>

</table>

</body>
</html>
