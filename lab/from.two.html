 <!DOCTYPE html>
<html>
<head>
    <title>Create Your Account</title>
</head>
<body>

<form>
<table align="center" border="0" cellpadding="10" width="500">

    <tr>
        <td colspan="2">
            <div>
                <h1>Create your account</h1>
                <p>Join us in a couple of steps.</p>
            </div>
        </td>
    </tr>

    <tr>
        <td colspan="2">
            <div>
                <label><b>Full name</b></label><br><br>
                <input type="text" name="fullname" placeholder="Jane Doe" style="width:100%;">
            </div>
        </td>
    </tr>

    <tr>
        <td colspan="2">
            <div>
                <label><b>Age</b></label><br><br>
                <input type="number" name="age" placeholder="28" style="width:100%;">
            </div>
        </td>
    </tr>

    <tr>
        <td colspan="2">
            <div>
                <label><b>Date of Birth</b></label><br><br>
                <input type="date" name="dob" style="width:100%;">
            </div>
        </td>
    </tr>

    <tr>
        <td colspan="2">
            <div>
                <label><b>Email Address</b></label><br><br>
                <input type="email" name="email" placeholder="jane@example.com" style="width:100%;">
            </div>
        </td>
    </tr>

    <tr>
        <td colspan="2">
            <div>
                <label><b>Password</b></label><br><br>
                <input type="password" name="password" placeholder="****" style="width:100%;">
            </div>
        </td>
    </tr>

    <tr>
        <td colspan="2">
            <div>
                <label><b>Preferred Contact</b></label><br><br>

                <input type="radio" name="contact" value="Email" checked> Email
                &nbsp;&nbsp;

                <input type="radio" name="contact" value="Phone"> Phone
                &nbsp;&nbsp;

                <input type="radio" name="contact" value="SMS"> SMS
            </div>
        </td>
    </tr>

    <tr>
        <td>
            <div>
                <input type="submit" value="Submit"
                style="width:100%; height:40px; background:#0d6efd; color:white;">
            </div>
        </td>

        <td>
            <div>
                <input type="reset" value="Reset"
                style="width:100%; height:40px;">
            </div>
        </td>
    </tr>

</table>
</form>

</body>
</html>
