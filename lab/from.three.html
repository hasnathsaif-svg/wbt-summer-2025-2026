<!DOCTYPE html>
<html>
<head>
<title>Registration Form</title>
</head>
<body>

<form>
<table align="center" cellpadding="8" width="400">

<tr>
<td colspan="2">
<h2>Registration</h2>
<p>Please complete all fields below:</p>
<hr>
</td>
</tr>

<tr>
<td>Full Name</td>
</tr>
<tr>
<td><input type="text" placeholder="Jane Doe" size="40"></td>
</tr>

<tr>
<td>Postal Code</td>
</tr>
<tr>
<td><input type="number" placeholder="10001" size="40"></td>
</tr>

<tr>
<td>Date of Birth</td>
</tr>
<tr>
<td><input type="date"></td>
</tr>

<tr>
<td>Email Address</td>
</tr>
<tr>
<td><input type="email" placeholder="jane@example.com" size="40"></td>
</tr>

<tr>
<td>Password</td>
</tr>
<tr>
<td><input type="password" placeholder="****" size="40"></td>
</tr>

<tr>
<td>Country</td>
</tr>
<tr>
<td>
<select>
<option>Select a country...</option>
<option>Bangladesh</option>
<option>India</option>
<option>USA</option>
</select>
</td>
</tr>

<tr>
<td>
<input type="submit" value="Submit">
<input type="reset" value="Reset">
</td>
</tr>

</table>
</form>

</body>
</html>
